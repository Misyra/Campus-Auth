[project]
name = "campus-auth"
version = "4.0.2"
description = "校园网自动认证工具，前后端分离（FastAPI + Web UI）"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "playwright",
    "fastapi",
    "uvicorn",
    "pydantic",
    "httpx",
    "pystray",
    "Pillow",
    "cairosvg",
    "cryptography",
    "ddddocr",
    "onnxruntime",
    "python-multipart",
    "loguru",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "psutil",
]
build = [
    "pyinstaller",
]

[tool.uv]
python-install-mirror = "https://registry.npmmirror.com/-/binary/python-build-standalone/"

[[tool.uv.index]]
url = "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"
default = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
