[project]
name = "campus-auth"
version = "3.0.0"
description = "校园网自动认证工具，前后端分离（FastAPI + Web UI）"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "python-dotenv>=1.0.0",
    "playwright>=1.55.0",
    "fastapi>=0.116.1",
    "uvicorn>=0.35.0",
    "pydantic>=2.11.7",
    "httpx>=0.28.1",
    "websockets>=16.0",
    "pystray>=0.19.5",
]

[project.optional-dependencies]
build = [
    "nuitka>=2.5.7",
    "ordered-set>=4.1.0",
    "pyinstaller>=6.19.0",
    "zstandard>=0.23.0",
]

[[tool.uv.index]]
url = "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"
default = true
