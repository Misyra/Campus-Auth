name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      # 测试全部为 mock 形式，无需真实 Chromium；跳过浏览器下载可省 30-60s
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: go run start.go --install-only

      - name: Install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x start.sh
          ./start.sh --install-only

      - name: Add local uv to PATH
        shell: bash
        run: echo "$GITHUB_WORKSPACE/.uv" >> "$GITHUB_PATH"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Run tests
        run: uv run pytest --tb=short -q --cov=app --cov-report=term-missing
