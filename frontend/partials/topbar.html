<header class="top-bar">
  <div class="top-title-area">
    <h1 class="page-title">{{ pageTitle }}</h1>
    <span v-if="configDirty" class="top-dirty-hint">· 未保存的更改</span>
  </div>
  <div class="top-actions">
    <div v-if="wsReconnecting" class="ws-reconnect-bar" style="position:static;border:none;padding:6px 12px;border-radius:var(--radius-md);">
      <span class="spinner"></span>
      重连中 ({{ wsRetryAttempt }}/{{ 5 }})
    </div>
    <div class="notification-wrapper" style="position:relative;">
      <button class="btn btn-icon-only" @click="showNotifications = !showNotifications; unreadNotifications = 0" title="通知历史">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span v-if="unreadNotifications > 0" style="position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:var(--error);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;">{{ unreadNotifications > 9 ? '9+' : unreadNotifications }}</span>
      </button>
      <div v-if="showNotifications" class="notification-dropdown" style="position:absolute;top:100%;right:0;width:320px;max-height:400px;overflow-y:auto;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:100;margin-top:8px;">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;font-weight:600;">通知历史</span>
          <button class="btn btn-text" style="padding:4px 8px;min-height:auto;font-size:12px;" @click="notifications = []">清空</button>
        </div>
        <div v-if="!notifications.length" style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">暂无通知</div>
        <div v-for="n in notifications" :key="n.time + n.message" style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
            <span :style="{color: n.success ? 'var(--success)' : 'var(--error)'}">{{ n.success ? '✓' : '✗' }}</span>
            <span style="color:var(--text-muted);font-size:11px;">{{ n.time }}</span>
          </div>
          <div style="color:var(--text-secondary);">{{ n.message }}</div>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" @click="toggleMonitor" :disabled="busy.monitor">
      <span v-if="busy.monitor" class="spinner" style="border-top-color:var(--bg-primary);"></span>
      <svg v-else class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polygon v-if="!status.monitoring" points="5 3 19 12 5 21 5 3"/>
        <g v-else>
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </g>
      </svg>
      {{ busy.monitor ? '处理中...' : (status.monitoring ? '停止监控' : '启动监控') }}
    </button>
  </div>
</header>
