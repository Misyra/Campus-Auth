<header class="top-bar">
  <div class="top-title-area">
    <h1 class="page-title">{{ pageTitle }}</h1>
    <span v-if="configDirty" class="top-dirty-hint">
      <span class="top-dirty-dot"></span>未保存
    </span>
  </div>
  <div class="top-actions">
    <div v-if="wsReconnecting" class="ws-reconnect-bar ws-reconnect-inline">
      <span class="spinner"></span>
      重连中 ({{ wsRetryCount }}/{{ wsMaxRetries }})
    </div>
    <div class="notification-wrapper">
      <button class="btn btn-icon-only" @click="showNotifications = !showNotifications; if (showNotifications) unreadNotifications = 0" title="通知历史" aria-haspopup="true" :aria-expanded="showNotifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span v-if="unreadNotifications > 0" class="notification-badge">{{ unreadNotifications > 9 ? '9+' : unreadNotifications }}</span>
      </button>
      <div v-if="showNotifications" class="notification-dropdown" role="menu">
        <div class="notification-header">
          <span>通知历史</span>
          <button class="btn btn-text btn-xs" @click="notifications = []">清空</button>
        </div>
        <div v-if="!notifications.length" class="notification-empty">暂无通知</div>
        <div v-for="n in notifications" :key="n.time + n.message" class="notification-item" :class="n.success ? 'notify-success' : 'notify-error'">
          <div class="notification-item-header">
            <span class="notify-icon" v-if="n.icon" v-html="n.icon"></span>
            <span class="notify-label" v-if="n.label">{{ n.label }}</span>
            <span class="time">{{ n.time }}</span>
          </div>
          <div class="notification-item-body">
            {{ n.message }}
            <a v-if="n.action" class="notify-action" @click.prevent="navigateTo(n.action.page); showNotifications = false">{{ n.action.label }}</a>
          </div>
        </div>
      </div>
    </div>
    <button class="btn btn-primary" @click="toggleMonitor" :disabled="busy.monitor" :title="status.monitoring ? '停止网络监控和自动登录' : '开始监控网络，断网时自动登录'">
      <span v-if="busy.monitor" class="spinner" style="border-top-color:var(--bg-primary);"></span>
      <svg v-else class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polygon v-if="!status.monitoring" points="5 3 19 12 5 21 5 3"/>
        <g v-else>
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </g>
      </svg>
      {{ busy.monitor ? '处理中...' : (status.monitoring ? '停止监控' : '启动监控') }}
    </button>
  </div>
</header>
