        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>仪表盘</span>

    <button
      class="nav-item"
      :class="{ active: currentPage === 'settings' }"
      @click="navigateTo('settings')"

      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>

    <button
      class="nav-item"
      :class="{ active: currentPage === 'tasks' }"
      @click="navigateTo('tasks')"
      title="任务管理"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>

        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>任务管理</span>
    </button>

    <button
      class="nav-item"
      :class="{ active: currentPage === 'about' }"
      @click="navigateTo('about')"
      title="关于"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span>关于</span>
    </button>

    <div class="nav-more">
      <button
        class="nav-item nav-more-trigger"
        :class="{ active: ['profiles', 'profile-edit', 'scripts', 'scheduled_tasks', 'appearance', 'logs'].includes(currentPage) }"

        title="更多"
      >

        <div class="nav-more-menu" v-show="showMoreNav">

          class="nav-item"

        <button
          class="nav-item"
          :class="{ active: currentPage === 'scripts' }"
          @click="navigateTo('scripts', true)"
          title="自定义脚本"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          <span>自定义脚本</span>
        </button>

        <button
          class="nav-item"
          :class="{ active: currentPage === 'scheduled_tasks' }"
          @click="navigateTo('scheduled_tasks', true)"
          title="定时任务"
        >
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>定时任务</span>
        </button>

        <button
          class="nav-item"
          :class="{ active: currentPage === 'appearance' }"
          @click="navigateTo('appearance', true)"
          title="外观"
        >

          <span>外观</span>
        </button>

      </div>
      </transition>
    </div>

    <div class="status-badge" :class="status.monitoring ? 'online' : 'offline'">
      <span class="status-dot"></span>

    </div>
    <button class="btn btn-danger btn-sm quit-btn" @click="quitApp" :disabled="busy.monitor" title="退出应用">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      退出
