<nav v-if="!showWizard" class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <img src="/static/black-cat.svg" alt="logo" class="logo-icon" />
      <span class="logo-text">校园网认证</span>
    </div>
  </div>

  <div class="nav-links">
    <button
      class="nav-item"
      :class="{ active: currentPage === 'dashboard' }"
      @click="currentPage = 'dashboard'"
      title="仪表盘"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>仪表盘</span>
    </button>

    <button
      class="nav-item"
      :class="{ active: currentPage === 'settings' }"
      @click="currentPage = 'settings'"
      title="设置"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <span>设置</span>
    </button>

    <button
      class="nav-item"
      :class="{ active: currentPage === 'tasks' }"
      @click="currentPage = 'tasks'"
      title="任务管理"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span>任务</span>
    </button>

    <button
      class="nav-item"
      :class="{ active: currentPage === 'about' }"
      @click="currentPage = 'about'"
      title="关于"
    >
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span>关于</span>
    </button>
  </div>

  <div class="sidebar-footer">
    <div class="status-badge" :class="status.monitoring ? 'online' : 'offline'">
      <span class="status-dot"></span>
      {{ status.monitoring ? '运行中' : '已停止' }}
    </div>
    <button class="btn btn-danger btn-sm quit-btn" @click="quitApp" :disabled="busy.monitor" title="退出应用">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      退出
    </button>
  </div>
</nav>
