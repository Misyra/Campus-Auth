<div v-if="currentPage === 'dashboard'" class="page-content fade-in" :class="{ 'has-banner': status.monitoring }">
  <div v-if="status.monitoring" class="network-status-banner" :class="networkStatus">
    <span class="status-dot"></span>
    <span>{{ networkStatusText }}</span>
  </div>

  <!-- 骨架屏：数据加载完成前显示 -->
  <template v-if="isLoading">
    <div class="skeleton-grid">
      <div class="skeleton-card skeleton-shimmer"></div>
      <div class="skeleton-card skeleton-shimmer"></div>
      <div class="skeleton-card skeleton-shimmer"></div>
      <div class="skeleton-card skeleton-shimmer"></div>
    </div>
    <div class="skeleton-row">
      <div class="skeleton-card skeleton-shimmer" style="height:200px;"></div>
      <div class="skeleton-card skeleton-shimmer" style="height:300px;"></div>
    </div>
  </template>

  <template v-else>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon green">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-label">运行时长</span>
        <span class="stat-value">{{ formatDuration(status.runtime_seconds) }}</span>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-label">检测次数</span>
        <span class="stat-value">{{ status.network_check_count }}</span>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon orange">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-label">失败计数</span>
        <span class="stat-value">{{ status.login_attempt_count }}</span>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon purple">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div class="stat-info">
        <span class="stat-label">最后检测</span>
        <span class="stat-value">{{ status.last_check_time ? formatTime(status.last_check_time) : '-' }}</span>
      </div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="dashboard-left">
      <div class="card">
        <div class="card-header">
          <h2>快捷操作</h2>
        </div>
        <div class="card-body">
          <div class="action-buttons">
            <button class="btn btn-secondary" @click="manualLogin" :disabled="busy.action" title="立即执行一次登录认证，不影响自动监控">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
              手动登录
            </button>
            <button class="btn btn-secondary" @click="testNetwork" :disabled="busy.action" title="检测当前网络连接是否正常">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
                <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <circle cx="12" cy="20" r="1"/>
              </svg>
              网络测试
            </button>
          </div>
        </div>
      </div>

      <!-- 登录历史 -->
      <div class="card history-card">
      <div class="card-header">
        <h2>登录历史</h2>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn btn-icon-only" @click="fetchLoginHistory" title="刷新" aria-label="刷新登录历史">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button class="btn btn-icon-only" @click="clearLoginHistory" title="清空历史" aria-label="清空登录历史" :disabled="!loginHistory.length">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div v-if="!loginHistory.length" class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>暂无登录记录</span>
        </div>
        <div v-else class="history-list">
          <div v-for="item in loginHistory" :key="item.id" class="history-item" :class="item.success ? 'success' : 'failed'">
            <div class="history-status">
              <svg v-if="item.success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
              </svg>
            </div>
            <div class="history-info">
              <div class="history-row">
                <span class="history-time">{{ item.timestamp }}</span>
                <span class="history-duration">{{ item.duration_ms }}ms</span>
              </div>
              <div class="history-row">
                <span class="history-profile">{{ item.profile_name || '默认方案' }}</span>
              </div>
              <span v-if="item.error" class="history-error">{{ item.error }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>

    <div class="card log-card">
      <div class="card-header">
        <h2>实时日志</h2>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn btn-icon-only" :class="{ 'btn-active': autoScroll }" @click="autoScroll = !autoScroll" :title="autoScroll ? '自动滚动：开' : '自动滚动：关'" :aria-label="autoScroll ? '关闭自动滚动' : '开启自动滚动'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path v-if="autoScroll" d="M12 19V5M5 12l7-7 7 7"/>
              <path v-else d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
          </button>
          <button class="btn btn-icon-only" @click="fetchLogs" title="刷新" aria-label="刷新日志">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <button class="btn btn-icon-only" @click="logs = []; newLogCount = 0" title="清空日志" aria-label="清空日志">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="log-toolbar">
          <div class="log-filter-chips">
            <button class="log-filter-chip" :class="{ active: !logFilter.level }" @click="logFilter.level = ''">全部</button>
            <button class="log-filter-chip" :class="{ active: logFilter.level === 'INFO' }" @click="logFilter.level = logFilter.level === 'INFO' ? '' : 'INFO'">INFO</button>
            <button class="log-filter-chip" :class="{ active: logFilter.level === 'WARNING' }" @click="logFilter.level = logFilter.level === 'WARNING' ? '' : 'WARNING'">WARN</button>
            <button class="log-filter-chip" :class="{ active: logFilter.level === 'ERROR' }" @click="logFilter.level = logFilter.level === 'ERROR' ? '' : 'ERROR'">ERROR</button>
            <button class="log-filter-chip" :class="{ active: logFilter.level === 'DEBUG' }" @click="logFilter.level = logFilter.level === 'DEBUG' ? '' : 'DEBUG'">DEBUG</button>
          </div>
          <input v-model="logFilter.search" type="text" placeholder="搜索日志..." class="log-search" aria-label="搜索日志" />
        </div>
        <div ref="logViewer" class="log-viewer" @scroll="onLogScroll">
          <div v-if="!filteredLogs.length" class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span>{{ logFilter.search || logFilter.level ? '无匹配日志' : '暂无日志' }}</span>
          </div>
          <div v-else class="log-entries">
            <div v-for="item in filteredLogs" :key="item.timestamp + item.message" class="log-entry">
              <span class="log-time">{{ formatLogTime(item.timestamp) }}</span>
              <span class="log-meta">{{ formatLogMeta(item) }}</span>
              <div class="log-content">
                <span class="log-message" :class="getLogClass(item)">{{ stripScreenshotHint(item.message) }}</span>
                <div v-if="item._screenshot" class="log-screenshot-wrap">
                  <img
                    :src="item._screenshot"
                    class="log-screenshot-preview"
                    @click="openFullscreen(item._screenshot)"
                    loading="lazy"
                    alt="截图"
                  />
                </div>
              </div>
            </div>
          </div>
          <button v-if="newLogCount > 0" class="new-logs-btn" @click="scrollToBottom(); newLogCount = 0">
            {{ newLogCount }} 条新消息
          </button>
        </div>
      </div>
    </div>
  </div>
  </template>
</div>
