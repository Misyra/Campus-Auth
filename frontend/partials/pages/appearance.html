<div v-if="currentPage === 'appearance'" class="page-content fade-in settings-page">
  <form @submit.prevent="saveAppearance" class="settings-form">
    <div class="settings-panel-grid">
      <!-- 背景图片 -->
      <section class="card settings-panel">
        <div class="card-header">
          <h2>背景图片</h2>
        </div>
        <div class="card-body">
          <div class="appearance-bg-preview" v-if="appearance.background_url">
            <img :src="appearance.background_url" alt="背景预览" />
            <button type="button" class="btn btn-danger btn-sm" @click="clearBackgroundImage">清除背景</button>
          </div>
          <div class="form-group">
            <label>背景图片</label>
            <div class="appearance-bg-actions">
              <button type="button" class="btn btn-secondary" @click="selectBackgroundImage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                选择图片
              </button>
              <span class="text-muted" style="font-size:12px;">支持 JPG、PNG、GIF，最大 5MB</span>
            </div>
          </div>
          <div class="form-group" v-if="appearance.background_url">
            <label>模糊度：{{ appearance.background_blur }}px</label>
            <input type="range" v-model.number="appearance.background_blur" min="0" max="30" step="1" />
          </div>
          <div class="form-group" v-if="appearance.background_url">
            <label>暗度：{{ Math.round(appearance.background_opacity * 100) }}%</label>
            <input type="range" v-model.number="appearance.background_opacity" min="0" max="0.8" step="0.05" />
          </div>
        </div>
      </section>

      <!-- 主题色 -->
      <section class="card settings-panel">
        <div class="card-header">
          <h2>主题色</h2>
        </div>
        <div class="card-body">
          <div class="appearance-colors">
            <button
              v-for="color in getAccentColors()"
              :key="color.value"
              type="button"
              class="appearance-color-btn"
              :class="{ active: appearance.accent_color === color.value }"
              :style="{ background: color.value }"
              @click="appearance.accent_color = color.value"
              :title="color.label"
            >
              <svg v-if="appearance.accent_color === color.value" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" style="width:16px;height:16px;">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </button>
          </div>
          <div class="form-group">
            <label>自定义颜色</label>
            <input type="color" v-model="appearance.accent_color" />
          </div>
        </div>
      </section>

      <!-- 字体大小 -->
      <section class="card settings-panel">
        <div class="card-header">
          <h2>字体大小</h2>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label>基础字体大小：{{ appearance.font_size }}px</label>
            <input type="range" v-model.number="appearance.font_size" min="12" max="18" step="1" />
            <div class="appearance-font-preview" :style="{ fontSize: appearance.font_size + 'px' }">
              预览文字大小 The quick brown fox
            </div>
          </div>
        </div>
      </section>

      <!-- 动态背景 -->
      <section class="card settings-panel">
        <div class="card-header">
          <h2>动态背景</h2>
        </div>
        <div class="card-body">
          <div class="form-group">
            <div class="toggle-group">
              <label class="toggle">
                <input type="checkbox" v-model="appearance.animate_gradient" />
                <span class="toggle-slider"></span>
                <span class="toggle-label">启用动态渐变背景</span>
              </label>
            </div>
            <p class="form-hint">背景颜色会缓慢变化，增加视觉动感</p>
          </div>
        </div>
      </section>

      <!-- 操作按钮 -->
      <div class="settings-float-save">
        <button type="button" class="btn btn-secondary" @click="resetAppearance">恢复默认</button>
        <button type="submit" class="btn btn-primary">保存外观</button>
      </div>
    </div>
  </form>
</div>
