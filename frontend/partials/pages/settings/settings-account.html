<div v-if="currentSettingsTab === 'account'" class="settings-panel-grid">
  <section class="card settings-panel">
    <div class="card-header">
      <h2>账号配置</h2>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label for="settings-username">账号</label>
        <input
          id="settings-username"
          v-model.trim="config.username"
          name="username"
          type="text"
          placeholder="学号/账号"
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label for="settings-password">密码</label>
        <input
          id="settings-password"
          v-model="config.password"
          name="password"
          type="password"
          :placeholder="config.password && config.password.startsWith('•') ? '密码已加密保存，清空后输入新密码' : '输入密码'"
          autocomplete="current-password"
          @focus="$event.target.select()"
        />
        <span class="hint">本地加密保存，配置切换和备份均无法导出</span>
      </div>
      <div class="form-group">
        <div class="field-label-row">
          <label for="settings-auth-url">认证地址</label>
          <span
            class="field-help"
            tabindex="0"
            role="note"
            data-tip="校园网认证页面的地址，以 http:// 或 https:// 开头。"
          >?</span>
        </div>
        <input
          id="settings-auth-url"
          v-model.trim="config.auth_url"
          type="text"
          placeholder="http://"
        />
      </div>
      <div class="form-group">
        <div class="field-label-row">
          <label for="settings-carrier">运营商</label>
          <span
            class="field-help"
            tabindex="0"
            role="note"
            data-tip="校园网登录页面的运营商选择。选择&quot;无&quot;则跳过运营商步骤；选择&quot;自定义&quot;可输入关键字匹配登录页面的运营商列表，适用于非标准运营商名称。"
          >?</span>
        </div>
        <custom-select v-model="config.carrier" :options="carrierOptions"></custom-select>
      </div>
      <div v-if="config.carrier === '自定义'" class="form-group">
        <label for="settings-carrier-custom">自定义运营商关键字</label>
        <input
          id="settings-carrier-custom"
          v-model.trim="config.carrier_custom"
          name="carrier_custom"
          type="text"
          placeholder="例如：校园专网、宿舍网、移动(新)"
        />
      </div>
    </div>
  </section>

  <!-- 自定义变量 -->
  <section class="card settings-panel">
    <div class="card-header">
      <h2>自定义变量</h2>
    </div>
    <div class="card-body">
      <p class="form-help-text">在任务模板中使用 <code v-pre>{{变量名}}</code> 引用这些变量</p>

      <!-- 表头 -->
      <div v-if="Object.keys(config.custom_variables || {}).length > 0" class="custom-vars-header">
        <span class="header-name">变量名</span>
        <span class="header-separator"></span>
        <span class="header-value">变量值</span>
        <span class="header-action"></span>
      </div>

      <div class="custom-vars-list">
        <div v-for="(value, key) in config.custom_variables" :key="key" class="custom-var-item">
          <div class="var-name-col">
            <input
              type="text"
              :value="key"
              :data-var-key="key"
              @change="updateCustomVarKey(key, $event.target.value)"
              placeholder="如：MY_VAR"
            />
          </div>
          <span class="var-separator">:</span>
          <div class="var-value-col">
            <input
              type="text"
              v-model="config.custom_variables[key]"
              placeholder="变量值"
            />
          </div>
          <button type="button" class="btn btn-icon-only btn-danger btn-delete-var" @click="removeCustomVar(key)" title="删除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="button" class="btn btn-secondary btn-sm" @click="addCustomVar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        添加变量
      </button>
    </div>
  </section>
</div>
