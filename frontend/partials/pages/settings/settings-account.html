<div v-if="currentSettingsTab === 'account'" class="settings-panel-grid">
  <section class="card settings-panel">
    <div class="card-header">
      <h2>账号配置</h2>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label for="settings-username">账号</label>
        <input
          id="settings-username"
          v-model.trim="config.username"
          name="username"
          type="text"
          placeholder="学号/账号"
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label for="settings-password">密码</label>
        <input
          id="settings-password"
          v-model="config.password"
          name="password"
          type="password"
          :placeholder="config.password && config.password.startsWith('•') ? '密码已加密保存，清空后输入新密码' : '输入密码'"
          autocomplete="current-password"
          @focus="$event.target.select()"
        />
      </div>
      <div class="form-group">
        <div class="field-label-row">
          <label for="settings-auth-url">认证地址</label>
          <span
            class="field-help"
            tabindex="0"
            role="note"
            data-tip="校园网认证页面的地址，以 http:// 或 https:// 开头。会同步到后端运行配置和任务模板中的 {{url}} 变量。"
          >?</span>
        </div>
        <input
          id="settings-auth-url"
          v-model.trim="config.auth_url"
          type="text"
          placeholder="http://"
        />
      </div>
      <div class="form-group">
        <div class="field-label-row">
          <label for="settings-carrier">运营商</label>
          <span
            class="field-help"
            tabindex="0"
            role="note"
            data-tip="校园网登录页面的运营商选择。选择&quot;无&quot;则跳过运营商步骤；选择&quot;自定义&quot;可输入关键字匹配下拉选项文本，适用于非标准运营商名称。"
          >?</span>
        </div>
        <select id="settings-carrier" v-model="config.carrier" name="carrier">
          <option>移动</option>
          <option>联通</option>
          <option>电信</option>
          <option>无</option>
          <option>自定义</option>
        </select>
      </div>
      <div v-if="config.carrier === '自定义'" class="form-group">
        <label for="settings-carrier-custom">自定义运营商关键字</label>
        <input
          id="settings-carrier-custom"
          v-model.trim="config.carrier_custom"
          name="carrier_custom"
          type="text"
          placeholder="例如：校园专网、宿舍网、移动(新)"
        />
      </div>
    </div>
  </section>
</div>
