<div v-if="currentSettingsTab === 'browser'" class="settings-panel-grid">
  <!-- 浏览器选择 -->
  <section class="card settings-panel">
    <div class="settings-card-header">
      <svg class="settings-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
      </svg>
      <h2>浏览器类型</h2>
    </div>
    <div class="card-body">
      <p class="form-help-text">选择用于自动登录的浏览器</p>

      <div class="browser-selection">
        <div v-if="browserLoading" class="loading">正在检测浏览器...</div>

        <div v-else class="browser-cards">
          <div
            v-for="browser in availableBrowsers"
            :key="browser.channel"
            class="browser-card"
            :class="{ active: config.browser.browser_channel === browser.channel, disabled: !browser.installed }"
            @click="handleBrowserClick(browser)"
          >
            <div class="browser-icon">
              <img :src="browser.icon" :alt="browser.name" width="32" height="32" />
            </div>
            <div class="browser-info">
              <div class="browser-name">{{ browser.name }}</div>
              <div class="browser-status">
                <span v-if="browser.channel === 'custom'" class="status-custom">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                  </svg>
                  自定义路径
                </span>
                <span v-else-if="browser.installed" class="status-installed">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                  已安装
                </span>
                <span v-else-if="playwrightDownloading && browser.channel === 'playwright'" class="status-downloading">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" class="spin">
                    <path d="M21 12a9 9 0 11-6.219-8.56"/>
                  </svg>
                  下载中...
                </span>
                <span v-else class="status-not-installed">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  未安装
                </span>
              </div>
              <div class="browser-desc">{{ browser.description }}</div>
            </div>
            <div v-if="config.browser.browser_channel === browser.channel" class="browser-check">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- 浏览器选择共享提示（Firefox 警告 + 自定义提示 + 路径输入） -->
        <div data-include="/static/partials/shared/browser-selection.html"></div>
      </div>
    </div>
  </section>

  <section class="card settings-panel">
    <div class="settings-card-header">
      <svg class="settings-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>
      </svg>
      <h2>基本设置</h2>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <div class="field-label-row">
            <label for="settings-browser-timeout">页面操作超时（秒）</label>
            <span class="field-help" tabindex="0" role="note" data-tip="任务执行时每个浏览器步骤（点击、输入、等待元素加载等）的最长等待时间。超时则该步骤失败，不影响整体登录流程的其他步骤。">?</span>
          </div>
          <input id="settings-browser-timeout" v-model.number="config.browser.timeout" type="number" min="1" max="60" />
        </div>
        <div class="form-group">
          <div class="field-label-row">
            <label for="settings-browser-navigation-timeout">打开登录页面超时（秒）</label>
            <span class="field-help" tabindex="0" role="note" data-tip="自动导航到登录页面的超时时间。校园网 DNS 劫持/重定向链较长时可适当调大。">?</span>
          </div>
          <input id="settings-browser-navigation-timeout" v-model.number="config.browser.navigation_timeout" type="number" min="3" max="60" />
        </div>
      </div>
      <div class="toggle-group">
        <div class="toggle-with-help">
          <label class="toggle toggle-help-inline">
            <input type="checkbox" v-model="config.browser.headless" />
            <span class="toggle-slider"></span>
            <span class="toggle-label">无头浏览器模式</span>
            <span class="field-help" tabindex="0" role="note" data-tip="开启后浏览器在后台运行，不显示窗口。关闭可观察浏览器操作过程，便于调试登录问题。">?</span>
          </label>
        </div>
      </div>
      <div class="toggle-group">
        <div class="toggle-with-help">
          <label class="toggle toggle-help-inline">
            <input type="checkbox" v-model="config.browser.low_resource_mode" />
            <span class="toggle-slider"></span>
            <span class="toggle-label">低资源模式（禁用图片）</span>
            <span class="field-help" tabindex="0" role="note" data-tip="拦截页面中的图片资源请求，减少带宽消耗和内存占用。对登录流程无影响，建议保持开启。">?</span>
          </label>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <div class="field-label-row">
            <label for="settings-browser-locale">浏览器语言（Locale）</label>
            <span class="field-help" tabindex="0" role="note" data-tip="设置浏览器语言，用于 Playwright 浏览器上下文的 locale 参数。部分认证页面会根据语言显示不同内容。默认为 zh-CN。">?</span>
          </div>
          <input id="settings-browser-locale" v-model.trim="config.browser.locale" type="text" placeholder="zh-CN" />
        </div>
        <div class="form-group">
          <div class="field-label-row">
            <label for="settings-browser-timezone">浏览器时区（Timezone）</label>
            <span class="field-help" tabindex="0" role="note" data-tip="设置浏览器时区，用于 Playwright 浏览器上下文的 timezone_id 参数。部分认证系统会检测时区设置。默认为 Asia/Shanghai。">?</span>
          </div>
          <input id="settings-browser-timezone" v-model.trim="config.browser.timezone_id" type="text" placeholder="Asia/Shanghai" />
        </div>
      </div>
    </div>
  </section>

  <section class="card settings-panel">
    <div class="settings-card-header">
      <svg class="settings-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <h2>安全与反检测</h2>
    </div>
    <div class="card-body">
      <div class="toggle-group">
        <div class="toggle-with-help">
          <label class="toggle toggle-help-inline">
            <input type="checkbox" v-model="config.browser.disable_web_security" />
            <span class="toggle-slider"></span>
            <span class="toggle-label">禁用同源策略</span>
            <span class="field-help" tabindex="0" role="note" data-tip="关闭浏览器的同源安全策略（CORS）。仅在认证页面因跨域请求被拦截而登录失败时才需要启用，一般情况请保持关闭。">?</span>
          </label>
        </div>
      </div>
      <div class="toggle-group">
        <div class="toggle-with-help">
          <label class="toggle toggle-help-inline">
            <input type="checkbox" v-model="config.browser.stealth_mode" />
            <span class="toggle-slider"></span>
            <span class="toggle-label">反检测模式</span>
            <span class="field-help" tabindex="0" role="note" data-tip="注入脚本隐藏浏览器自动化痕迹（navigator.webdriver、plugins 等）。部分认证页面可能因此脚本而显示异常，一般请保持关闭。">?</span>
          </label>
        </div>
      </div>
      <div v-show="config.browser.stealth_mode" class="form-group">
        <div class="field-label-row">
          <label for="settings-stealth-custom">反检测脚本</label>
          <span class="field-help" tabindex="0" role="note" data-tip="留空则使用内置默认脚本。填入内容将完全替换默认脚本（不是追加）。可点击「加载默认脚本」基于内置脚本修改。">?</span>
        </div>
        <div class="stealth-script-actions">
          <button type="button" class="btn btn-sm btn-secondary" @click="loadDefaultStealthScript()">
            加载默认脚本
          </button>
          <button type="button" class="btn btn-sm btn-ghost" v-if="config.browser.stealth_custom_script" @click="config.browser.stealth_custom_script = ''">
            恢复默认
          </button>
        </div>
        <textarea
          id="settings-stealth-custom"
          v-model="config.browser.stealth_custom_script"
          rows="10"
          placeholder="留空使用内置默认脚本..."
          class="settings-monospace-textarea"
        ></textarea>
      </div>
    </div>
  </section>

  <section class="card settings-panel">
    <div class="settings-card-header">
      <svg class="settings-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <h2>纯净模式与高级设置</h2>
    </div>
    <div class="card-body">
      <div class="toggle-group">
        <div class="toggle-with-help">
          <label class="toggle toggle-help-inline">
            <input type="checkbox" v-model="pureMode" @change="togglePureMode()" />
            <span class="toggle-slider"></span>
            <span class="toggle-label">纯净模式</span>
            <span class="field-help" tabindex="0" role="note" data-tip="使用 Chromium 原始设置启动浏览器，不注入任何自定义参数（UA、请求头、启动参数等）。适用于认证系统检测浏览器指纹的场景，可降低被识别为自动化工具的风险。">?</span>
          </label>
        </div>
      </div>
      <div v-if="pureMode" class="browser-safe-info">
        <p>纯净模式已开启，浏览器使用默认设置。关闭后可自定义以下高级选项。</p>
      </div>
      <div v-if="!pureMode" class="browser-safe-info browser-safe-info--warning">
        <p>当前为自定义模式。如果登录异常，可尝试开启纯净模式。</p>
      </div>
      <template v-if="!pureMode">
        <div class="form-group">
          <div class="field-label-row">
            <label>浏览器视口尺寸</label>
            <span class="field-help" tabindex="0" role="note" data-tip="浏览器窗口的宽度和高度（像素）。部分校园网认证页面在小分辨率下可能显示异常。">?</span>
          </div>
          <div class="viewport-input-row">
            <div class="viewport-input-group">
              <label for="settings-vp-w" class="viewport-label">宽</label>
              <input id="settings-vp-w" v-model.number="config.browser.viewport_width" type="number" min="320" max="3840" class="viewport-input" />
            </div>
            <span class="viewport-separator">×</span>
            <div class="viewport-input-group">
              <label for="settings-vp-h" class="viewport-label">高</label>
              <input id="settings-vp-h" v-model.number="config.browser.viewport_height" type="number" min="240" max="2160" class="viewport-input" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <div class="field-label-row">
            <label for="settings-browser-args">自定义浏览器参数</label>
            <span class="field-help" tabindex="0" role="note" data-tip="每行填写一个 Chromium 启动参数，会与程序内置的基础参数合并。留空则仅使用基础参数。">?</span>
            <button class="btn btn-sm btn-secondary ms-auto" type="button" @click="config.browser.browser_args = '--disable-blink-features=AutomationControlled\n--disable-software-rasterizer\n--disable-extensions\n--disable-background-timer-throttling\n--disable-backgrounding-occluded-windows\n--disable-renderer-backgrounding\n--disable-features=TranslateUI,BlinkGenPropertyTrees'">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sm">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
              </svg>
              加载推荐参数
            </button>
          </div>
          <textarea
            id="settings-browser-args"
            v-model.trim="config.browser.browser_args"
            rows="4"
            spellcheck="false"
            placeholder="--disable-blink-features=AutomationControlled&#10;--disable-software-rasterizer&#10;--disable-extensions"
          ></textarea>
          <span class="hint">每行一个参数。如果登录时被识别为自动化工具或页面无法正常加载，可点击「加载推荐参数」尝试。</span>
        </div>
        <div class="form-group">
          <div class="field-label-row">
            <label for="settings-browser-ua">用户代理</label>
            <span class="field-help" tabindex="0" role="note" data-tip="浏览器的 User-Agent 字符串。留空使用 Chromium 默认值，仅在认证系统对 UA 有特殊要求时再修改。">?</span>
          </div>
          <input id="settings-browser-ua" v-model.trim="config.browser.user_agent" type="text" placeholder="留空使用 Chromium 默认值" />
        </div>
        <div class="form-group">
          <div class="field-label-row">
            <label for="settings-browser-headers">自定义请求头（JSON）</label>
            <span class="field-help" tabindex="0" role="note" data-tip="填写 JSON 对象格式的请求头，会注入浏览器所有请求中。常用于设置 Referer、Cookie 等自定义头。">?</span>
          </div>
          <textarea
            id="settings-browser-headers"
            v-model.trim="config.browser.extra_headers_json"
            rows="4"
            spellcheck="false"
            placeholder='{"Referer":"http://..."}'
          ></textarea>
        </div>
      </template>
    </div>
  </section>
</div>
