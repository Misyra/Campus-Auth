<div v-if="currentPage === 'settings'" class="page-content settings-page">
  <div class="settings-tabs card">
    <button
      v-for="tab in settingsTabs"
      :key="tab.id"
      type="button"
      class="settings-tab"
      :class="{ active: currentSettingsTab === tab.id }"
      @click="setSettingsTab(tab.id)"
    >
      <span>{{ tab.label }}</span>
    </button>
  </div>

  <form v-if="currentSettingsTab !== 'tasks'" autocomplete="on" class="settings-form">
    <div data-include="/static/partials/pages/settings/settings-account.html"></div>
    <div data-include="/static/partials/pages/settings/settings-monitor.html"></div>
    <div data-include="/static/partials/pages/settings/settings-system.html"></div>
    <div data-include="/static/partials/pages/settings/settings-browser.html"></div>
  </form>

  <div data-include="/static/partials/pages/settings/settings-tasks.html"></div>

  <div class="save-bar">
    <button
      class="btn save-btn"
      :class="{ 'save-btn-dirty': !busy.save && !saveFailed && configDirty, 'save-btn-saving': busy.save, 'save-btn-failed': saveFailed && !busy.save }"
      @click="saveConfig"
      :disabled="busy.save"
    >
      <svg v-if="busy.save" class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      <svg v-else-if="saveFailed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
      </svg>
      <svg v-else viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      <span>{{ busy.save ? '保存中' : (saveFailed ? '重试' : '立即保存') }}</span>
    </button>
  </div>
</div>
